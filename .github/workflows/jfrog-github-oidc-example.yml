name: "Setup JFrog CLI OIDC Example"
on: push

permissions:
  id-token: write
  contents: read

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      JF_URL: ${{ vars.JF_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: BiggieFudge/juice-shop@github

      - name: Build Docker Image
        run: |
          # 1. Create a Docker-friendly URL (remove https:// and any trailing slashes)
          DOCKER_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed -e 's|^https://||' -e 's|/$||')
          
          # 2. Construct the full image name
          IMAGE_NAME="$DOCKER_REGISTRY/docker-local/juice-shop:${{ github.sha }}"
          
          echo "Building image: $IMAGE_NAME"
          
          # 3. Build the image
          docker build -t "$IMAGE_NAME" .
          
          # 4. Save the name for the next step
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: JFrog Docker Scan
        run: |
          # Use the variable we saved in GITHUB_ENV
          jf docker scan ${{ env.IMAGE_NAME }}

      - name: Ping JFrog
        run: jf rt ping
